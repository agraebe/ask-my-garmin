name: Nightly Production Smoke Tests

on:
  schedule:
    # 02:00 UTC every day
    - cron: '0 2 * * *'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  smoke:
    name: Production Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      failure_summary: ${{ steps.parse.outputs.failure_summary }}
      fail_count: ${{ steps.parse.outputs.fail_count }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run production smoke tests
        id: run_tests
        run: npx playwright test e2e/production-smoke.spec.ts
        continue-on-error: true
        env:
          CI: 'true'
          # Point Playwright at the live Vercel deployment
          BASE_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
          # Real Garmin credentials — stored as GitHub Actions secrets
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}

      - name: Parse test results
        id: parse
        if: steps.run_tests.outcome == 'failure'
        run: |
          node << 'ENDJS'
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('playwright-report/results.json', 'utf8'));
            const failures = [];

            function collect(suite) {
              for (const spec of (suite.specs || [])) {
                if (!spec.ok) {
                  const firstFailed = (spec.tests || [])
                    .flatMap(t => t.results || [])
                    .find(r => r.status === 'failed' || r.status === 'unexpected');
                  const errMsg = (firstFailed?.error?.message || 'unknown error')
                    .split('\n')[0]
                    .replace(/`/g, "'")
                    .substring(0, 120);
                  failures.push('- **' + spec.title + '**: `' + errMsg + '`');
                }
              }
              for (const s of (suite.suites || [])) collect(s);
            }

            for (const s of (data.suites || [])) collect(s);

            const summary = failures.length
              ? failures.join('\n')
              : '_No structured failure data found — see linked artifact._';

            const count = failures.length || data.stats?.unexpected || '?';

            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, 'fail_count=' + count + '\n');
            fs.appendFileSync(out, 'failure_summary<<__E2E_SUMMARY__\n' + summary + '\n__E2E_SUMMARY__\n');
          } catch(e) {
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, 'fail_count=?\n');
            fs.appendFileSync(out, 'failure_summary=_Could not parse test report: ' + e.message.substring(0, 100) + '_\n');
          }
          ENDJS

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots / traces)
        if: steps.run_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_id }}
          path: test-results/
          retention-days: 14

      # Re-fail the job so the dependent open-fix-issue job sees failure()
      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  # If the smoke job failed, open a GitHub Issue and tag @claude for auto-fix.
  open-fix-issue:
    name: Open auto-fix issue on failure
    needs: smoke
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create GitHub Issue for Claude auto-fix
        uses: actions/github-script@v7
        env:
          FAIL_COUNT: ${{ needs.smoke.outputs.fail_count }}
          FAILURE_SUMMARY: ${{ needs.smoke.outputs.failure_summary }}
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const failCount = process.env.FAIL_COUNT || '?';
            const failureSummary = process.env.FAILURE_SUMMARY || '_No details available._';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const reportArtifactUrl = `${runUrl}#artifacts`;

            const body = [
              '## 🔴 Nightly Smoke Tests Failed — Production is broken',
              '',
              `**Workflow run:** ${runUrl}`,
              `**Playwright report:** ${reportArtifactUrl}`,
              '',
              '### Failed tests',
              '',
              failureSummary,
              '',
              '### Context',
              'These are **real production smoke tests** — they hit the live Vercel frontend,',
              'Railway backend, Garmin API, and Anthropic API with real credentials.',
              'A failure means at least one core user flow is broken in production.',
              '',
              '### What to do',
              '@claude Please:',
              '1. Review the failed tests and identify the root cause.',
              '2. Check Vercel runtime logs and Railway service logs for errors around the test run time.',
              '3. Fix the bug in a new branch and open a PR that closes this issue.',
              '',
              '> This issue was opened automatically by the nightly smoke test workflow.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly Smoke] ${failCount} test(s) failed on ${date} — production is broken`,
              body,
              labels: ['bug', 'automated'],
            });
